# CI Workflow for MagnetarPrometheus
#
# Purpose:
#   This workflow enforces the quality gate that must pass on every push to the main
#   integration branches (master/main) and on every pull request targeting those branches.
#   It is the primary automated validation surface for the MagnetarPrometheus backend PoC.
#
# What this workflow validates:
#   1. Bootstrap path — exercises `scripts/bootstrap_python.sh` to confirm that a clean
#      environment can be prepared without manual intervention. This catches missing
#      dependency declarations and broken setup assumptions early.
#   2. Backend run-path — exercises `scripts/run_backend.sh` (no extra arguments) to confirm
#      that the default example workflow can actually be loaded, executed, and printed from
#      a freshly bootstrapped environment. This is the "does the product actually run?"
#      check, separate from unit-test correctness.
#   3. Test execution with coverage enforcement — exercises `scripts/run_tests.sh` which
#      invokes pytest for the backend and SDK scope, then runs the implemented UI tier.
#      The backend coverage gate still comes from `backend/pyproject.toml`, while the UI
#      tier depends on an installed Angular toolchain in `ui/node_modules`.
#
# Non-obvious execution semantics:
#   - Steps are intentionally ordered: bootstrap → run → test. Bootstrap must succeed before
#     the run-path is exercised, and the run-path validates the real CLI path independently
#     of the test harness.
#   - The `run_backend.sh` step exits after the example workflow completes. It does NOT start
#     a long-running server unless `--api` is passed, which is not the case here.
#   - Coverage enforcement is centralised in `backend/pyproject.toml` (addopts flag). No
#     coverage threshold is duplicated in this workflow file.
#   - Python version is pinned to 3.11 to match the project's minimum requirement declared
#     in `backend/pyproject.toml`. Changing it here without updating the project constraint
#     would produce a false-passing state.
#   - Node.js is pinned to 22.12.0 because the current Angular CLI requires at least
#     20.19 or 22.12, and the GitHub runner's default Node version is not guaranteed to
#     satisfy that floor.
#   - UI dependencies must be installed before `scripts/run_tests.sh` runs because the UI
#     tier shells out to `npm run build` and `npm run test:ci`, both of which expect the
#     local Angular CLI binaries in `ui/node_modules/.bin`.

name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  validate:
    name: Validation and Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"
          cache: "npm"
          cache-dependency-path: "ui/package-lock.json"

      - name: Install UI Dependencies
        run: npm ci
        working-directory: ui

      - name: Bootstrap Environment
        run: bash scripts/bootstrap_python.sh

      - name: Run Backend Execution
        run: bash scripts/run_backend.sh

      - name: Run Tests (Enforces 100% Coverage)
        run: bash scripts/run_tests.sh
