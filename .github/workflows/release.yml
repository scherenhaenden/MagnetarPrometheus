# Release Metadata Workflow for MagnetarPrometheus
#
# Purpose:
#   This workflow generates and persists the canonical release version stamp each time a
#   validated commit lands on master or a release tag is pushed. It serves as the
#   lightweight release-metadata layer for the current PoC maturity level, intentionally
#   stopping short of a full distribution or publishing pipeline.
#
# What this workflow produces:
#   - A version stamp string in the canonical MagnetarPrometheus format: yyyy.MM.dd HH:mm:sss
#     (generated by `scripts/get_version_stamp.sh` which wraps the `date` utility).
#   - A `release-version.txt` artifact uploaded to the GitHub Actions artifact store so that
#     the stamp is traceable alongside the triggering run without requiring a separate
#     release tag or branch tag to carry the metadata.
#
# Non-obvious execution semantics:
#   - The workflow can be triggered manually via `workflow_dispatch` to generate a stamp for
#     any branch state without requiring a push. This is the intended path for ad-hoc
#     release-metadata inspection during active development.
#   - The `release-*` tag pattern is a placeholder hook. Pushing a tag matching that pattern
#     (e.g. `release-2026.04.01`) triggers the same metadata generation so it can be inspected
#     against the corresponding commit. No automated publishing is attached to that trigger yet.
#   - The version stamp format uses milliseconds-suffix (`%3N`) from the `date` utility. On
#     some platforms this may produce `000` if sub-second precision is unavailable. That is
#     an acceptable PoC-level limitation and does not affect the yyyy.MM.dd HH:mm:sss shape.
#   - This workflow does NOT create git tags, GitHub releases, or publish packages. It is a
#     metadata-generation placeholder aligned with the versioning rule in RULES.md. Full
#     release publishing is explicitly out of scope at the current PoC stage.

name: Release Metadata

on:
  workflow_dispatch:
  push:
    branches:
      - master
    tags:
      - "release-*"

jobs:
  generate-metadata:
    name: Generate Release Metadata
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate canonical version stamp
        id: version
        run: |
          VERSION_STAMP="$(bash scripts/get_version_stamp.sh)"
          echo "version_stamp=${VERSION_STAMP}" >> "${GITHUB_OUTPUT}"
          echo "${VERSION_STAMP}" > release-version.txt

      - name: Upload release metadata
        uses: actions/upload-artifact@v4
        with:
          name: release-metadata
          path: release-version.txt

      - name: Print release stamp
        run: echo "Release stamp ${{ steps.version.outputs.version_stamp }}"
