id: email_triage
name: Email Triage Workflow
version: 1.0.0
start_step: fetch_emails

settings:
  max_retries_per_step: 3
  stop_on_unhandled_error: true

steps:
  fetch_emails:
    type: email.fetch
    executor: python
    config:
      mailbox: support@company.com
      unread_only: true
    next: extract_email_data

  extract_email_data:
    type: email.extract
    executor: python
    next: ai_decision

  ai_decision:
    type: ai.classify
    executor: python
    config:
      model: mock
    next:
      mode: conditional
      conditions:
        - when: "context['ai'].get('decision') == 'create_ticket'"
          go_to: create_ticket
        - when: "context['ai'].get('decision') == 'manual_review'"
          go_to: manual_review

  create_ticket:
    type: ticket.create
    executor: python
    next: end

  manual_review:
    type: review.queue
    executor: python
    next: end
